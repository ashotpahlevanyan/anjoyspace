<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0D1117"/>
  <!-- Outer petals - 6 -->
  <ellipse cx="16" cy="5.5" rx="2.2" ry="5.5" fill="#C9A96E" opacity="0.85" transform="rotate(0 16 16)"/>
  <ellipse cx="16" cy="5.5" rx="2.2" ry="5.5" fill="#C9A96E" opacity="0.85" transform="rotate(60 16 16)"/>
  <ellipse cx="16" cy="5.5" rx="2.2" ry="5.5" fill="#C9A96E" opacity="0.85" transform="rotate(120 16 16)"/>
  <ellipse cx="16" cy="5.5" rx="2.2" ry="5.5" fill="#C9A96E" opacity="0.85" transform="rotate(180 16 16)"/>
  <ellipse cx="16" cy="5.5" rx="2.2" ry="5.5" fill="#C9A96E" opacity="0.85" transform="rotate(240 16 16)"/>
  <ellipse cx="16" cy="5.5" rx="2.2" ry="5.5" fill="#C9A96E" opacity="0.85" transform="rotate(300 16 16)"/>
  <!-- Inner petals - 6 offset -->
  <ellipse cx="16" cy="8" rx="1.4" ry="4" fill="#E2C98A" opacity="0.7" transform="rotate(30 16 16)"/>
  <ellipse cx="16" cy="8" rx="1.4" ry="4" fill="#E2C98A" opacity="0.7" transform="rotate(90 16 16)"/>
  <ellipse cx="16" cy="8" rx="1.4" ry="4" fill="#E2C98A" opacity="0.7" transform="rotate(150 16 16)"/>
  <ellipse cx="16" cy="8" rx="1.4" ry="4" fill="#E2C98A" opacity="0.7" transform="rotate(210 16 16)"/>
  <ellipse cx="16" cy="8" rx="1.4" ry="4" fill="#E2C98A" opacity="0.7" transform="rotate(270 16 16)"/>
  <ellipse cx="16" cy="8" rx="1.4" ry="4" fill="#E2C98A" opacity="0.7" transform="rotate(330 16 16)"/>
  <!-- Center ring -->
  <circle cx="16" cy="16" r="4.5" fill="none" stroke="#C9A96E" stroke-width="0.6" opacity="0.6"/>
  <!-- Bindu center -->
  <circle cx="16" cy="16" r="2" fill="#C9A96E"/>
  <circle cx="16" cy="16" r="0.8" fill="#F5F0E8"/>
</svg>
