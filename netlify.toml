[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Pretty URLs / asset caching are handled by Astro's static output and the
# public/_redirects file (legacy /ani.html → /teachers/ani/ etc.).

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
